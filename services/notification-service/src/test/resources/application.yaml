spring:
  datasource:
    url: jdbc:h2:mem:notification_test_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092

notification:
  webhook:
    max-retries: 3

management:
  tracing:
    enabled: false

otel:
  sdk:
    disabled: true
